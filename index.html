<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Серёжа · звук</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0c, #2d1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 3px solid #ff6b6b;
            border-radius: 60px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #ffb6c1;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #ffb347;
            margin: 20px 0;
            box-shadow: 0 20px 40px rgba(255,0,100,0.5);
        }
        audio {
            width: 100%;
            height: 50px;
            margin: 20px 0;
            border-radius: 30px;
        }
        .note {
            color: #aaa;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎵 Серёжа</h1>
        
        <img src="https://cdn.globalsportsystems.org/portraits/2021/2009/md/62704b8ba34bb.webp" alt="Серёжа">
        
        <!-- ПЛЕЕР С ПРЯМОЙ ССЫЛКОЙ НА ТВОЙ ФАЙЛ -->
        <audio controls preload="auto">
            <source src="https://github.com/desta2010/1/raw/main/bot-tatyana_4038058.mp3" type="audio/mpeg">
            Твой браузер не поддерживает аудио
        </audio>
        
        <p class="note">
            👆 Нажми ▶️ чтобы послушать
        </p>
    </div>
</body>
</html>
