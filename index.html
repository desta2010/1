<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Серёжа · звук</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a0f0c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .card {
            background: #2d1a1a;
            padding: 30px;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            border: 3px solid #ff6b6b;
        }
        img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #ffb347;
            margin: 20px;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 50px;
            margin: 20px;
            cursor: pointer;
            border: 2px solid white;
            font-weight: bold;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color: #ffb6c1;">Серёжа</h1>
        <img src="https://cdn.globalsportsystems.org/portraits/2021/2009/md/62704b8ba34bb.webp" alt="Серёжа">
        
        <!-- Самое главное - аудио элемент -->
        <audio id="myAudio">
            <source src="https://drive.google.com/uc?export=download&id=1azFqHsqAhFWlC3xpwWxxT1EebWrVABl1" type="audio/mp4">
        </audio>
        
        <!-- Кнопка -->
        <button onclick="playSound()">
            🔊 НАЖМИ СЮДА
        </button>
        
        <p style="color: #aaa; margin-top: 20px;">👆 нажми и слушай</p>
    </div>

    <script>
        function playSound() {
            var audio = document.getElementById('myAudio');
            audio.play();
            
            // Меняем текст кнопки на 1 секунду
            var btn = event.target;
            btn.innerHTML = '🔊 ИГРАЕТ...';
            setTimeout(function() {
                btn.innerHTML = '🔊 НАЖМИ СЮДА';
            }, 1000);
        }
    </script>
</body>
</html>
